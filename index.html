<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
</head>
<body>

<script>
  // Get hash params from Supabase
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);

  const accessToken = params.get("access_token");
  const refreshToken = params.get("refresh_token");
  const type = params.get("type");

  // Basic validation
  if (!accessToken) {
    document.body.innerHTML = "Invalid or expired link.";
    throw new Error("No access token found");
  }

  // Detect mobile
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

  if (isMobile) {
    // ✅ Build deeplink WITH tokens
    const deepLink =
      `neemow://neemow.com/signin` +
      `?access_token=${encodeURIComponent(accessToken)}` +
      `&refresh_token=${encodeURIComponent(refreshToken)}` +
      `&type=${encodeURIComponent(type)}`;

    // 👇 Tumhara wrapper use ho raha hai
    window.location.href =
      `https://neemow.com/?to=${encodeURIComponent(deepLink)}`;

  } else {
    // ✅ Web redirect WITH tokens
    window.location.href =
      `https://neemow-5d4cfz.flutterflow.app/signin` +
      `#access_token=${encodeURIComponent(accessToken)}` +
      `&refresh_token=${encodeURIComponent(refreshToken)}` +
      `&type=${encodeURIComponent(type)}`;
  }
</script>

</body>
</html>
